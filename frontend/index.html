<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ARIA — AI Voice Agent</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
</head>

<body>
    <div class="noise"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <header class="header">
        <div class="logo">
            <span class="logo-mark">▲</span>
            <span class="logo-text">ARIA</span>
        </div>
        <div class="header-right">
            <span id="status-badge" class="badge badge--idle">IDLE</span>
            <div class="api-status"><span class="dot"></span></div>
        </div>
    </header>

    <main class="main">
        <section class="conversation" id="conversation" aria-live="polite">
            <div class="conversation__empty" id="conversation-empty">
                <p class="empty-hint">Press the button below and start speaking.</p>
            </div>
        </section>

        <section class="mic-zone">
            <div class="rings" id="rings">
                <div class="ring ring-1"></div>
                <div class="ring ring-2"></div>
                <div class="ring ring-3"></div>
            </div>

            <button class="mic-btn" id="mic-btn" aria-label="Start recording">
                <!-- Mic icon -->
                <svg class="mic-icon" id="mic-icon" viewBox="0 0 24 24" fill="none">
                    <rect x="9" y="2" width="6" height="12" rx="3" fill="currentColor" />
                    <path d="M5 10a7 7 0 0 0 14 0" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
                        fill="none" />
                    <line x1="12" y1="17" x2="12" y2="21" stroke="currentColor" stroke-width="1.8"
                        stroke-linecap="round" />
                    <line x1="8" y1="21" x2="16" y2="21" stroke="currentColor" stroke-width="1.8"
                        stroke-linecap="round" />
                </svg>
                <!-- Stop icon -->
                <svg class="stop-icon hidden" id="stop-icon" viewBox="0 0 24 24" fill="none">
                    <rect x="6" y="6" width="12" height="12" rx="2" fill="currentColor" />
                </svg>
            </button>

            <p class="state-label" id="state-label">TAP TO SPEAK</p>
        </section>
    </main>

    <div class="transcript-bar" id="transcript-bar">
        <span class="transcript-bar__label">YOU SAID</span>
        <p class="transcript-bar__text" id="transcript-text"></p>
    </div>

    <div class="toast-container" id="toast-container"></div>
    <audio id="audio-player" preload="auto"></audio>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/audio.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
